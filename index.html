<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRIGHT Results</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
:root {
  --bg: #f8fafc;
  --surface: #fff;
  --border: #e2e8f0;
  --border-light: #f1f5f9;
  --text: #0f172a;
  --muted: #64748b;
  --faint: #94a3b8;
  --primary: #6366f1;
  --primary-bg: #eef2ff;
  --primary-dark: #4338ca;
  --nav-bg: #0f172a;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
* { scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }

/* Nav */
nav {
  position: sticky; top: 0; z-index: 100;
  background: var(--nav-bg); height: 58px; padding: 0 28px;
  display: flex; align-items: center; gap: 6px;
  box-shadow: 0 1px 0 rgba(0,0,0,.3);
}
.nav-brand { color: #fff; font-weight: 700; font-size: 17px; margin-right: 20px; flex-shrink: 0; }
.nav-tabs { display: flex; gap: 2px; }
.nav-tab {
  color: var(--faint); font-size: 14px; font-weight: 500;
  padding: 8px 16px; border-radius: 8px; cursor: pointer;
  border: none; background: none; transition: all .15s;
}
.nav-tab:hover { background: rgba(255,255,255,.08); color: #e2e8f0; }
.nav-tab.active { background: rgba(99,102,241,.2); color: #a5b4fc; }
.nav-search { margin-left: auto; position: relative; flex-shrink: 0; }
.nav-search input {
  background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
  border-radius: 8px; color: #e2e8f0; font-size: 13px;
  padding: 7px 14px 7px 32px; width: 210px; outline: none; transition: all .2s;
}
.nav-search input::placeholder { color: var(--faint); }
.nav-search input:focus { background: rgba(255,255,255,.12); border-color: rgba(99,102,241,.5); width: 270px; }
.nav-search-icon {
  position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
  color: var(--faint); pointer-events: none;
}
.nav-meta { font-size: 12px; color: #475569; flex-shrink: 0; margin-left: 12px; }

/* Layout */
#content { max-width: 1440px; margin: 0 auto; padding: 20px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* Cards */
.card {
  background: var(--surface); border-radius: var(--radius);
  padding: 24px 28px; box-shadow: var(--shadow); margin-bottom: 20px;
}
.card-title {
  font-size: 17px; font-weight: 600; margin-bottom: 18px;
  display: flex; align-items: center; gap: 10px;
}
.card-title::before {
  content: ''; width: 4px; height: 22px;
  background: var(--primary); border-radius: 2px; flex-shrink: 0;
}

/* Stats */
.stats-row { display: flex; gap: 14px; margin-bottom: 20px; flex-wrap: wrap; }
.stat {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px 24px; text-align: center;
  min-width: 110px; box-shadow: var(--shadow);
}
.stat-val { font-size: 1.6rem; font-weight: 700; color: var(--primary); line-height: 1.2; }
.stat-lbl {
  font-size: 12px; text-transform: uppercase;
  letter-spacing: .06em; color: var(--muted); margin-top: 4px;
}

/* Toolbar / Controls */
.toolbar {
  display: flex; align-items: center; gap: 16px;
  flex-wrap: wrap; margin-bottom: 16px; font-size: 14px; color: var(--muted);
}
.toolbar-label { font-weight: 500; }
.pill-group { display: flex; gap: 5px; flex-wrap: wrap; }
.pill {
  background: var(--border); color: var(--muted); border: none;
  border-radius: 999px; padding: 6px 18px; font-size: 13px;
  font-weight: 500; cursor: pointer; transition: all .15s; line-height: 1.5;
}
.pill.on { background: var(--primary); color: #fff; }
.pill:hover:not(.on) { background: #cbd5e1; color: var(--text); }
.toggle-group { display: flex; background: var(--border); border-radius: 999px; padding: 3px; }
.toggle-btn {
  background: none; border: none; border-radius: 999px;
  padding: 6px 18px; font-size: 13px; font-weight: 500;
  cursor: pointer; color: var(--muted); transition: all .15s;
}
.toggle-btn.on { background: var(--primary); color: #fff; }

/* Tables */
.tbl-wrap {
  overflow-x: auto; border: 1px solid var(--border); border-radius: 10px;
}
table { border-collapse: collapse; font-size: 13px; white-space: nowrap; width: 100%; }
thead th {
  position: sticky; top: 0; z-index: 2;
  background: #f8fafc; color: #475569; font-size: 12px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .04em; padding: 12px 14px;
  text-align: right; border-bottom: 2px solid var(--border);
  cursor: pointer; user-select: none; transition: all .12s;
}
thead th:first-child, thead th:nth-child(2) { text-align: left; }
thead th.sorted { background: var(--primary-bg); color: var(--primary-dark); }
thead th.asc::after { content: ' \2191'; font-size: 11px; }
thead th.desc::after { content: ' \2193'; font-size: 11px; }
tbody td {
  padding: 9px 14px; border-bottom: 1px solid var(--border-light);
  text-align: right; font-size: 13px; font-variant-numeric: tabular-nums;
  transition: background .1s;
}
tbody td:first-child, tbody td:nth-child(2) { text-align: left; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #f8fafc !important; }
td.best { outline: 2px solid var(--primary); outline-offset: -2px; font-weight: 700; }
td.worst { outline: 2px solid #ef4444; outline-offset: -2px; font-weight: 700; }
.child-row td { background: #fafbfc; }
.child-indent { padding-left: 32px !important; border-left: 3px solid var(--border); }
.expand-btn {
  background: none; border: none; color: var(--faint);
  cursor: pointer; font-size: 11px; padding: 0 5px 0 0;
  vertical-align: middle; transition: color .15s, transform .2s;
  display: inline-block;
}
.expand-btn:hover { color: var(--primary); }
.expand-btn.open { transform: rotate(90deg); }

/* Family stripes */
tr[data-fam="wiki"] td:first-child { border-left: 3px solid #10b981; }
tr[data-fam="acereason"] td:first-child { border-left: 3px solid #8b5cf6; }
tr[data-fam="baseline"] td:first-child { border-left: 3px solid #94a3b8; }
.legend { display: flex; gap: 18px; font-size: 13px; color: var(--muted); margin-top: 14px; }
.legend-dot {
  display: inline-block; width: 10px; height: 10px;
  border-radius: 50%; margin-right: 6px; vertical-align: middle;
}

/* Top K */
.domain-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px;
}
.domain-card { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.domain-hdr { background: linear-gradient(135deg, #6366f1, #8b5cf6); padding: 10px 14px; }
.domain-hdr h4 {
  font-size: 13px; font-weight: 600; color: #fff;
  text-transform: capitalize;
}
.domain-body { padding: 8px 10px; }
.topk-list { list-style: none; counter-reset: rank; }
.topk-item {
  display: flex; align-items: baseline; gap: 8px;
  padding: 6px 4px; border-bottom: 1px solid var(--border-light); counter-increment: rank;
}
.topk-item:last-child { border-bottom: none; }
.topk-item::before {
  content: counter(rank); font-size: 12px; font-weight: 700;
  color: var(--faint); min-width: 16px; text-align: center; flex-shrink: 0;
}
.tk-name {
  flex: 1; font-size: 13px; color: #334155;
  word-break: break-all; line-height: 1.4;
}
.tk-score {
  background: var(--primary-bg); color: var(--primary);
  border-radius: 999px; padding: 2px 10px; font-size: 13px;
  font-weight: 600; flex-shrink: 0; white-space: nowrap;
}
.k-input {
  width: 56px; padding: 6px 10px; border: 1px solid var(--border);
  border-radius: 6px; font-size: 14px; text-align: center; outline: none;
  -moz-appearance: textfield;
}
.k-input::-webkit-inner-spin-button,
.k-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.k-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,.1); }

/* Training Curves */
.curves-controls {
  background: var(--surface); border-radius: var(--radius);
  padding: 20px 24px; box-shadow: var(--shadow); margin-bottom: 20px;
}
.size-label {
  display: inline-block; background: var(--primary-bg); color: var(--primary);
  border-radius: 6px; padding: 6px 14px; font-size: 14px;
  font-weight: 600; margin: 14px 0 10px;
}
.chart-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px;
}
.chart-card {
  background: #fafbfc; border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 10px 8px; overflow: hidden;
}

/* Loading */
#loading {
  min-height: 60vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px; padding: 60px 20px;
}
.spinner {
  width: 32px; height: 32px; border: 3px solid var(--border);
  border-top-color: var(--primary); border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { text-align: center; color: var(--muted); font-size: 14px; }
.loading-text code {
  background: var(--bg); border: 1px solid var(--border);
  padding: 2px 6px; border-radius: 4px; font-size: 11px; color: var(--primary);
}
.section-anchor { scroll-margin-top: 68px; }
</style>
</head>
<body>

<nav>
  <span class="nav-brand">BRIGHT</span>
  <div class="nav-tabs">
    <button class="nav-tab active" data-tab="overview">Overview</button>
    <button class="nav-tab" data-tab="curves">Training Curves</button>
  </div>
  <div class="nav-search">
    <svg class="nav-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
    </svg>
    <input type="text" id="search" placeholder="Search experiments..." />
  </div>
  <span class="nav-meta" id="nav-meta"></span>
</nav>

<div id="content">
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text">
      Loading <code>data.json</code>...<br>
      <small>If local, serve with <code>python -m http.server</code></small>
    </div>
  </div>
</div>

<script>
let DATA = null, searchQuery = '', chartInits = [];

function h(tag, attrs, ...kids) {
  const el = document.createElement(tag);
  if (attrs) for (const [k, v] of Object.entries(attrs)) {
    if (k === 'cls') el.className = v;
    else if (k === 'text') el.textContent = v;
    else if (k === 'html') el.innerHTML = v;
    else if (k.startsWith('on') && typeof v === 'function') el.addEventListener(k.slice(2), v);
    else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k === 'dataset') Object.assign(el.dataset, v);
    else el.setAttribute(k, v);
  }
  for (const c of kids.flat()) if (c != null)
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  return el;
}

function cellBg(t) { return `hsl(${Math.round(t * 120)}, 50%, 84%)`; }

function expFamily(name) {
  const b = name.replace(/\/checkpoint-.*/, '');
  return b.startsWith('wiki') ? 'wiki' : b.startsWith('acereason') ? 'acereason' : 'baseline';
}

function baseName(name) {
  const m = name.match(/^(.+)\/checkpoint-\d+/);
  return m ? m[1] : name;
}

function expVal(exp, field) {
  if (field === 'experiment') return exp.name;
  if (field === 'retriever_size') return exp.retriever_size;
  if (field === 'avg') return exp.avg != null ? exp.avg.toFixed(2) : '';
  const s = exp.scores[field];
  return s != null ? s.toFixed(2) : '';
}

// ── Table heatmap (skip cols 0,1 — name & size aren't scores) ───────────────
function recolor(tbl) {
  const tbody = tbl.querySelector('tbody');
  const rows = [...tbody.querySelectorAll('tr')].filter(r => r.style.display !== 'none');
  const n = tbl.querySelector('thead tr').cells.length;
  const mins = Array(n).fill(Infinity), maxs = Array(n).fill(-Infinity);
  for (const row of rows) for (let i = 2; i < row.cells.length; i++) {
    const v = parseFloat(row.cells[i].dataset.val);
    if (!isNaN(v)) { mins[i] = Math.min(mins[i], v); maxs[i] = Math.max(maxs[i], v); }
  }
  for (const row of tbody.querySelectorAll('tr')) {
    const vis = row.style.display !== 'none';
    for (let i = 2; i < row.cells.length; i++) {
      const c = row.cells[i]; c.classList.remove('best', 'worst');
      const v = parseFloat(c.dataset.val);
      if (!isNaN(v) && maxs[i] > mins[i] && vis) {
        c.style.background = cellBg((v - mins[i]) / (maxs[i] - mins[i]));
        if (v === maxs[i]) c.classList.add('best');
        if (v === mins[i]) c.classList.add('worst');
      } else c.style.background = '';
    }
  }
}

function sortTbl(th) {
  const tbl = th.closest('table'), idx = [...th.parentNode.children].indexOf(th);
  const asc = !th.classList.contains('asc');
  for (const x of th.parentNode.children) x.classList.remove('sorted', 'asc', 'desc');
  th.classList.add('sorted', asc ? 'asc' : 'desc');
  const tbody = tbl.querySelector('tbody');
  [...tbody.querySelectorAll('tr:not(.child-row)')].sort((a, b) => {
    const av = a.cells[idx]?.dataset.val ?? '', bv = b.cells[idx]?.dataset.val ?? '';
    const an = parseFloat(av), bn = parseFloat(bv);
    return (asc ? 1 : -1) * ((!isNaN(an) && !isNaN(bn)) ? an - bn : av.localeCompare(bv));
  }).forEach(row => {
    tbody.appendChild(row);
    const gid = row.dataset.gid;
    if (gid) tbody.querySelectorAll(`[data-parent="${gid}"]`).forEach(c => tbody.appendChild(c));
  });
}

function switchTab(tab) {
  for (const b of document.querySelectorAll('.nav-tab')) b.classList.toggle('active', b.dataset.tab === tab);
  for (const p of document.querySelectorAll('.tab-panel')) p.classList.toggle('active', p.id === 'tab-' + tab);
  if (tab === 'curves' && chartInits.length) {
    requestAnimationFrame(() => { chartInits.forEach(fn => fn()); chartInits = []; });
  }
}

function selectedSet(containerId, key) {
  return new Set([...document.querySelectorAll(`#${containerId} .pill.on`)].map(p => p.dataset[key]));
}

// ── Build: Stats ─────────────────────────────────────────────────────────────
function buildStats(data) {
  return h('div', {cls: 'stats-row'},
    ...[
      [data.experiments.length, 'experiments'],
      [data.groups ? Object.keys(data.groups).length : 0, 'families'],
      [data.meta.metric, 'metric'],
    ].map(([v, l]) => h('div', {cls: 'stat'},
      h('div', {cls: 'stat-val', text: String(v)}),
      h('div', {cls: 'stat-lbl', text: l})
    ))
  );
}

// ── Build: Top K ─────────────────────────────────────────────────────────────
function buildTopK(data) {
  const rankings = {};
  for (const t of data.meta.tasks)
    rankings[t] = [...data.experiments].filter(e => e.scores[t] != null).sort((a, b) => b.scores[t] - a.scores[t]);

  const kInput = h('input', {type: 'number', id: 'topk-k', value: '3', min: '1', max: '50', cls: 'k-input', oninput: updateTopK});
  const pills = h('div', {cls: 'pill-group', id: 'topk-sizes'});
  for (const s of ['3B', '8B'])
    pills.appendChild(h('button', {cls: 'pill on', text: s, dataset: {size: s},
      onclick: e => { e.target.classList.toggle('on'); updateTopK(); }}));

  const grid = h('div', {cls: 'domain-grid', id: 'topk-grid'});
  for (const t of data.meta.tasks) {
    const list = h('ol', {cls: 'topk-list'});
    for (const exp of rankings[t])
      list.appendChild(h('li', {cls: 'topk-item', dataset: {size: exp.retriever_size}},
        h('span', {cls: 'tk-name', title: exp.name, text: exp.name}),
        h('span', {cls: 'tk-score', text: exp.scores[t].toFixed(2)})
      ));
    grid.appendChild(h('div', {cls: 'domain-card'},
      h('div', {cls: 'domain-hdr'}, h('h4', {text: t.replace(/_/g, ' ')})),
      h('div', {cls: 'domain-body'}, list)
    ));
  }

  requestAnimationFrame(updateTopK);
  return h('div', {cls: 'card', id: 'topk'},
    h('div', {cls: 'card-title', text: 'Top K per Domain'}),
    h('div', {cls: 'toolbar'}, h('span', {cls: 'toolbar-label', text: 'Show top'}), kInput, h('span', {cls: 'toolbar-label', text: 'per domain'}), pills),
    grid
  );
}

function updateTopK() {
  const k = Math.max(1, parseInt(document.getElementById('topk-k')?.value) || 3);
  const on = selectedSet('topk-sizes', 'size');
  for (const list of document.querySelectorAll('.topk-list')) {
    let shown = 0;
    for (const item of list.querySelectorAll('.topk-item')) {
      const ok = on.has(item.dataset.size) && shown < k;
      item.style.display = ok ? '' : 'none';
      if (ok) shown++;
    }
  }
}

// ── Build: Domain Scatter Plot ───────────────────────────────────────────────
function buildDomainScatter(data) {
  const {meta} = data;
  const expMap = {}; data.experiments.forEach(e => expMap[e.name] = e);

  const bestPerGroup = {};
  for (const exp of data.experiments) {
    const base = baseName(exp.name);
    const key = base + '::' + exp.retriever_size;
    if (!bestPerGroup[key] || (exp.avg || 0) > (bestPerGroup[key].avg || 0))
      bestPerGroup[key] = exp;
  }
  const exps = Object.values(bestPerGroup).sort((a, b) => (b.avg || 0) - (a.avg || 0));

  const famColors = {wiki: '#10b981', acereason: '#8b5cf6', baseline: '#94a3b8'};
  const sizeSymbols = {'3B': 'circle', '8B': 'diamond'};

  const grid = h('div', {cls: 'chart-grid', id: 'scatter-grid'});
  const inits = [];

  meta.tasks.forEach((task, i) => {
    const cid = 'scatter-' + i;
    const div = h('div', {id: cid, style: {height: '320px'}});
    grid.appendChild(h('div', {cls: 'chart-card'}, div));

    const sorted = exps.filter(e => e.scores[task] != null)
      .sort((a, b) => a.scores[task] - b.scores[task]);
    const names = sorted.map(e => e.name);
    const scores = sorted.map(e => Math.round(e.scores[task] * 100) / 100);
    const colors = sorted.map(e => famColors[expFamily(e.name)] || '#94a3b8');
    const symbols = sorted.map(e => sizeSymbols[e.retriever_size] || 'circle');

    inits.push(() => {
      Plotly.newPlot(cid, [{
        type: 'scatter', x: scores, y: names, mode: 'markers',
        marker: {size: 10, color: colors, symbol: symbols, line: {width: 1, color: '#fff'}},
        hovertemplate: '%{y}<br>' + meta.metric + ': %{x:.2f}<extra></extra>',
      }], {
        title: {text: task.replace(/_/g, ' '), font: {size: 14, color: '#334155', family: 'system-ui'}, x: 0.5},
        xaxis: {title: meta.metric, titlefont: {size: 11, color: '#64748b'}, tickfont: {size: 10, color: '#94a3b8'},
                gridcolor: '#f1f5f9', linecolor: '#e2e8f0', zerolinecolor: '#e2e8f0'},
        yaxis: {tickfont: {size: 10, color: '#475569'}, automargin: true,
                gridcolor: '#f1f5f9', linecolor: '#e2e8f0'},
        margin: {l: 10, r: 20, t: 36, b: 50},
        plot_bgcolor: '#fff', paper_bgcolor: 'rgba(0,0,0,0)',
        height: 320,
      }, {responsive: true, displayModeBar: false});
    });
  });

  const legend = h('div', {cls: 'legend', style: {marginBottom: '14px'}},
    ...Object.entries(famColors).map(([n, c]) =>
      h('span', null, h('span', {cls: 'legend-dot', style: {background: c}}), n)
    ),
    h('span', {style: {marginLeft: '12px'}}, '\u25CF 3B'),
    h('span', null, '\u25C6 8B'),
  );

  const card = h('div', {cls: 'card', id: 'domain-scatter'},
    h('div', {cls: 'card-title', text: 'Domain Comparison'}),
    legend, grid
  );
  card._plotInits = inits;
  return card;
}

// ── Build: Experiments Table ─────────────────────────────────────────────────
function buildExpTable(data) {
  const {experiments, meta} = data;
  const fields = ['experiment', 'retriever_size', ...meta.tasks, 'avg'];
  const expMap = {}; experiments.forEach(e => expMap[e.name] = e);

  const groups = {};
  for (const exp of experiments) {
    const key = baseName(exp.name) + '::' + exp.retriever_size;
    (groups[key] ??= []).push(exp);
  }
  for (const exps of Object.values(groups))
    exps.sort((a, b) => (a.checkpoint_step || 0) - (b.checkpoint_step || 0));

  const parents = Object.values(groups).map(exps => {
    const best = exps.reduce((a, b) => (a.avg || 0) >= (b.avg || 0) ? a : b);
    return {best, last: exps[exps.length - 1], children: exps.filter(e => e !== best)};
  }).sort((a, b) => (b.best.avg || 0) - (a.best.avg || 0));

  const allBaseNames = [...new Set(parents.map(p => baseName(p.best.name)))].sort();

  // Experiment-name pills (like training curves families)
  const expPills = h('div', {cls: 'pill-group', id: 'exp-pills'});
  for (const bn of allBaseNames)
    expPills.appendChild(h('button', {cls: 'pill on', text: bn, dataset: {base: bn},
      onclick: e => { e.target.classList.toggle('on'); filterExp(); }}));

  // Size pills
  const sizePills = h('div', {cls: 'pill-group', id: 'size-pills'});
  for (const s of ['3B', '8B'])
    sizePills.appendChild(h('button', {cls: 'pill on', text: s, dataset: {size: s},
      onclick: e => { e.target.classList.toggle('on'); filterExp(); }}));

  const bestBtn = h('button', {cls: 'toggle-btn on', text: 'Best', onclick: () => setMode('best')});
  const lastBtn = h('button', {cls: 'toggle-btn', text: 'Last', onclick: () => setMode('last')});

  const tbl = h('table', {id: 'exp-table'});
  const hrow = h('tr');
  for (const f of fields) hrow.appendChild(h('th', {text: f.replace(/_/g, ' '), onclick: function() { sortTbl(this); }}));
  tbl.appendChild(h('thead', null, hrow));

  const tbody = h('tbody');
  parents.forEach((p, i) => {
    const {best, last, children} = p, hasCh = children.length > 0, gid = 'g' + i;
    const base = baseName(best.name);
    const tr = h('tr', {dataset: {
      size: best.retriever_size, fam: expFamily(best.name), base,
      ...(hasCh ? {gid, bestName: best.name, lastName: last.name} : {})
    }});
    if (hasCh) tr.classList.add('parent-row');
    for (let j = 0; j < fields.length; j++) {
      const val = expVal(best, fields[j]), td = h('td', {dataset: {val}});
      if (j === 0 && hasCh) {
        td.appendChild(h('button', {cls: 'expand-btn', text: '\u25B6', onclick: () => toggleCh(gid)}));
        td.appendChild(document.createTextNode(' ' + val));
      } else td.textContent = val;
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
    for (const ch of children) {
      const ctr = h('tr', {cls: 'child-row', style: {display: 'none'}, dataset: {
        parent: gid, size: ch.retriever_size, fam: expFamily(ch.name), base: baseName(ch.name)
      }});
      for (let j = 0; j < fields.length; j++) {
        const val = expVal(ch, fields[j]), td = h('td', {dataset: {val}, text: val});
        if (j === 0) td.classList.add('child-indent');
        ctr.appendChild(td);
      }
      tbody.appendChild(ctr);
    }
  });
  tbl.appendChild(tbody);

  const legend = h('div', {cls: 'legend'},
    ...['wiki:#10b981', 'acereason:#8b5cf6', 'baseline:#94a3b8'].map(p => {
      const [n, c] = p.split(':');
      return h('span', null, h('span', {cls: 'legend-dot', style: {background: c}}), n);
    })
  );

  const card = h('div', {cls: 'card', id: 'experiments'},
    h('div', {cls: 'card-title', text: 'Experiments'}),
    h('div', {cls: 'toolbar'},
      h('span', {cls: 'toolbar-label', text: 'Experiments:'}), expPills),
    h('div', {cls: 'toolbar'},
      h('span', {cls: 'toolbar-label', text: 'Size:'}), sizePills,
      h('span', {cls: 'toolbar-label', text: 'Parent:'}), h('div', {cls: 'toggle-group'}, bestBtn, lastBtn)
    ),
    h('div', {cls: 'tbl-wrap'}, tbl), legend
  );
  requestAnimationFrame(() => recolor(tbl));

  function filterExp() {
    const onSz = selectedSet('size-pills', 'size');
    const onBase = selectedSet('exp-pills', 'base');
    for (const row of tbody.querySelectorAll('tr:not(.child-row)')) {
      const name = (row.cells[0]?.dataset.val ?? '').toLowerCase();
      const show = onSz.has(row.dataset.size) && onBase.has(row.dataset.base)
        && (!searchQuery || name.includes(searchQuery));
      row.style.display = show ? '' : 'none';
      const gid = row.dataset.gid;
      if (gid) {
        const open = row.querySelector('.expand-btn')?.classList.contains('open');
        for (const ch of tbody.querySelectorAll(`[data-parent="${gid}"]`))
          ch.style.display = (show && open && onSz.has(ch.dataset.size) && onBase.has(ch.dataset.base)) ? '' : 'none';
      }
    }
    recolor(tbl);
  }

  function setMode(mode) {
    bestBtn.classList.toggle('on', mode === 'best');
    lastBtn.classList.toggle('on', mode === 'last');
    for (const row of tbody.querySelectorAll('tr.parent-row')) {
      const exp = expMap[mode === 'best' ? row.dataset.bestName : row.dataset.lastName];
      if (!exp) continue;
      row.dataset.size = exp.retriever_size;
      row.dataset.fam = expFamily(exp.name);
      row.dataset.base = baseName(exp.name);
      for (let i = 0; i < row.cells.length; i++) {
        const cell = row.cells[i], val = expVal(exp, fields[i]);
        cell.dataset.val = val;
        const btn = cell.querySelector('.expand-btn');
        if (btn) {
          cell.textContent = '';
          cell.appendChild(btn);
          cell.appendChild(document.createTextNode(' ' + val));
        } else {
          cell.textContent = val;
        }
      }
    }
    recolor(tbl);
  }

  function toggleCh(gid) {
    const parent = tbody.querySelector(`[data-gid="${gid}"]`);
    const btn = parent.querySelector('.expand-btn');
    const opening = !btn.classList.contains('open');
    btn.classList.toggle('open', opening);
    const onSz = selectedSet('size-pills', 'size');
    const onBase = selectedSet('exp-pills', 'base');
    for (const ch of tbody.querySelectorAll(`[data-parent="${gid}"]`))
      ch.style.display = (opening && onSz.has(ch.dataset.size) && onBase.has(ch.dataset.base)) ? '' : 'none';
    recolor(tbl);
  }

  tbl._filter = filterExp;
  return card;
}

// ── Build: Training Curves ───────────────────────────────────────────────────
function buildCurves(data) {
  if (!data.groups) return h('div', {cls: 'card', text: 'No checkpoint groups found.'});
  const expMap = {}; data.experiments.forEach(e => expMap[e.name] = e);
  const families = Object.keys(data.groups).sort();
  const allSizes = new Set();
  Object.values(data.groups).forEach(sg => Object.keys(sg).forEach(s => allSizes.add(s)));

  const famPills = h('div', {cls: 'pill-group'});
  for (const fam of families) {
    const sid = fam.replace(/[^a-zA-Z0-9]+/g, '-');
    famPills.appendChild(h('button', {cls: 'pill on', text: fam, dataset: {family: sid}, onclick: e => {
      e.target.classList.toggle('on');
      const sec = document.getElementById('fam-' + sid);
      if (sec) sec.style.display = e.target.classList.contains('on') ? '' : 'none';
    }}));
  }

  const szPills = h('div', {cls: 'pill-group'});
  for (const s of [...allSizes].sort())
    szPills.appendChild(h('button', {cls: 'pill on', text: s, dataset: {size: s}, onclick: e => {
      e.target.classList.toggle('on');
      document.querySelectorAll(`.size-block[data-size="${s}"]`).forEach(b => b.style.display = e.target.classList.contains('on') ? '' : 'none');
    }}));

  const controls = h('div', {cls: 'curves-controls'},
    h('div', {cls: 'toolbar', style: {marginBottom: '0'}},
      h('span', {cls: 'toolbar-label', text: 'Families:'}), famPills,
      h('span', {cls: 'toolbar-label', text: 'Size:'}), szPills
    )
  );

  const wrap = h('div', null, controls);
  for (const [base, sizeGroups] of Object.entries(data.groups).sort((a, b) => a[0].localeCompare(b[0]))) {
    const sid = base.replace(/[^a-zA-Z0-9]+/g, '-');
    const sec = h('div', {cls: 'card section-anchor', id: 'fam-' + sid, style: {marginBottom: '16px'}});
    sec.appendChild(h('div', {cls: 'card-title', text: base}));

    const allExps = Object.values(sizeGroups).flat().map(n => expMap[n]).filter(Boolean)
      .sort((a, b) => (a.checkpoint_step || 0) - (b.checkpoint_step || 0));
    sec.appendChild(buildFlatTbl(allExps, data.meta.tasks));

    for (const [size, names] of Object.entries(sizeGroups)) {
      const exps = names.map(n => expMap[n]).filter(Boolean);
      const block = h('div', {cls: 'size-block', dataset: {size}});
      block.appendChild(h('div', {cls: 'size-label', text: size + ' checkpoints'}));
      const {grid, inits} = buildCharts(base, size, exps, data.meta.tasks, data.meta.metric);
      block.appendChild(grid);
      chartInits.push(...inits);
      sec.appendChild(block);
    }
    wrap.appendChild(sec);
  }
  return wrap;
}

function buildFlatTbl(exps, tasks) {
  const fields = ['experiment', 'retriever_size', ...tasks, 'avg'];
  const tbl = h('table');
  const hrow = h('tr');
  for (const f of fields) hrow.appendChild(h('th', {text: f.replace(/_/g, ' '), onclick: function() { sortTbl(this); }}));
  tbl.appendChild(h('thead', null, hrow));
  const tbody = h('tbody');
  for (const exp of exps) {
    const tr = h('tr', {dataset: {size: exp.retriever_size, fam: expFamily(exp.name)}});
    for (const f of fields) tr.appendChild(h('td', {dataset: {val: expVal(exp, f)}, text: expVal(exp, f)}));
    tbody.appendChild(tr);
  }
  tbl.appendChild(tbody);
  const wrap = h('div', {cls: 'tbl-wrap', style: {marginBottom: '12px'}}, tbl);
  requestAnimationFrame(() => recolor(tbl));
  return wrap;
}

function buildCharts(base, size, exps, tasks, metric) {
  const color = size === '8B' ? '#8b5cf6' : '#6366f1';
  const grid = h('div', {cls: 'chart-grid'}), inits = [];
  const plotLayout = {
    margin: {l: 48, r: 12, t: 34, b: 48},
    plot_bgcolor: '#fff', paper_bgcolor: 'rgba(0,0,0,0)', height: 240,
  };
  const axisBase = {titlefont: {size: 11, color: '#64748b'}, tickfont: {size: 10, color: '#94a3b8'},
    gridcolor: '#f1f5f9', linecolor: '#e2e8f0', zerolinecolor: '#e2e8f0'};

  tasks.forEach((task, i) => {
    const cid = `c-${base.replace(/[^a-zA-Z0-9]/g, '')}-${size}-${i}`;
    const div = h('div', {id: cid, style: {height: '240px'}});
    grid.appendChild(h('div', {cls: 'chart-card'}, div));
    const steps = [], ys = [];
    for (const exp of exps) if (exp.checkpoint_step != null && exp.scores[task] != null) {
      steps.push(exp.checkpoint_step);
      ys.push(Math.round(exp.scores[task] * 100) / 100);
    }
    inits.push(() => {
      Plotly.newPlot(cid, [{
        type: 'scatter', x: steps, y: ys, mode: 'lines+markers', name: size,
        line: {color, width: 2}, marker: {size: 5, color},
        hovertemplate: '%{x}: %{y:.2f}<extra>' + size + '</extra>',
      }], {
        ...plotLayout,
        title: {text: task.replace(/_/g, ' '), font: {size: 13, color: '#334155', family: 'system-ui'}, x: 0.5},
        xaxis: {title: 'step', ...axisBase}, yaxis: {title: metric, ...axisBase},
      }, {responsive: true, displayModeBar: false});
    });
  });
  return {grid, inits};
}

// ── Boot ─────────────────────────────────────────────────────────────────────
fetch('./data.json')
  .then(r => { if (!r.ok) throw new Error(r.status + ' ' + r.statusText); return r.json(); })
  .then(data => {
    DATA = data;
    document.getElementById('loading').remove();
    document.title = 'BRIGHT Results';
    const now = new Date();
    document.getElementById('nav-meta').textContent =
      now.toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'});

    const content = document.getElementById('content');
    const overview = h('div', {cls: 'tab-panel active', id: 'tab-overview'});
    overview.appendChild(buildStats(data));
    overview.appendChild(buildTopK(data));
    const scatterCard = buildDomainScatter(data);
    overview.appendChild(scatterCard);
    overview.appendChild(buildExpTable(data));
    content.appendChild(overview);

    const curves = h('div', {cls: 'tab-panel', id: 'tab-curves'});
    curves.appendChild(buildCurves(data));
    content.appendChild(curves);

    for (const btn of document.querySelectorAll('.nav-tab'))
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    document.getElementById('search').addEventListener('input', e => {
      searchQuery = e.target.value.toLowerCase();
      document.getElementById('exp-table')?._filter?.();
    });

    // Scatter plots are visible now — render immediately
    if (scatterCard._plotInits) {
      requestAnimationFrame(() => scatterCard._plotInits.forEach(fn => fn()));
    }

    if (location.hash === '#curves') switchTab('curves');
  })
  .catch(err => {
    const el = document.getElementById('loading');
    if (el) el.innerHTML = `<div class="loading-text"><b>Could not load data.json.</b><br>
      If local, serve with <code>python -m http.server</code><br>
      <small style="color:#94a3b8">${err}</small></div>`;
  });
</script>
