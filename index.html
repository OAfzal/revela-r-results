<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRIGHT Results</title>
<style>
/* ── Reset & base ─────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  margin: 0;
  background: #f1f5f9;
  color: #1e293b;
  line-height: 1.5;
  scrollbar-width: thin;
  scrollbar-color: #cbd5e1 transparent;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }

/* ── Nav ──────────────────────────────────────────────────────────────────── */
nav {
  position: sticky;
  top: 0;
  background: #1e293b;
  height: 52px;
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 4px;
  z-index: 200;
  box-shadow: 0 1px 0 rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.2);
}

.nav-title {
  color: #fff;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: .01em;
  margin-right: 12px;
  white-space: nowrap;
  flex-shrink: 0;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 2px;
  flex: 1;
  flex-wrap: wrap;
  overflow: hidden;
}

nav a {
  color: #94a3b8;
  text-decoration: none;
  font-size: 12px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 6px;
  transition: background .15s, color .15s;
  white-space: nowrap;
}
nav a:hover { background: rgba(255,255,255,.1); color: #e2e8f0; }
nav a.active { background: rgba(99,102,241,.25); color: #a5b4fc; }

.nav-date {
  font-size: 11px;
  color: #475569;
  white-space: nowrap;
  margin-left: auto;
  flex-shrink: 0;
  padding-left: 16px;
}

/* ── Layout ───────────────────────────────────────────────────────────────── */
#content {
  max-width: 1400px;
  margin: 0 auto;
  padding: 24px 20px 48px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ── Cards ────────────────────────────────────────────────────────────────── */
section {
  background: #ffffff;
  border-radius: 14px;
  padding: 24px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 8px 24px rgba(0,0,0,.05);
}

section h2 {
  margin: 0 0 18px;
  font-size: 1rem;
  font-weight: 600;
  color: #1e293b;
  border-left: 3px solid #6366f1;
  padding-left: 10px;
  line-height: 1.4;
}

/* ── Loading ──────────────────────────────────────────────────────────────── */
#loading-wrap {
  min-height: 60vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 60px 20px;
}

.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid #e2e8f0;
  border-top-color: #6366f1;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  flex-shrink: 0;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-msg {
  text-align: center;
  color: #64748b;
  font-size: 14px;
  line-height: 1.8;
}
.loading-msg b { color: #1e293b; }
.loading-msg code {
  background: #f1f5f9;
  border: 1px solid #e2e8f0;
  padding: 2px 7px;
  border-radius: 5px;
  font-size: 12px;
  color: #6366f1;
}

/* ── Table controls ───────────────────────────────────────────────────────── */
.tbl-controls {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 14px;
  flex-wrap: wrap;
  font-size: 13px;
  color: #64748b;
}

/* ── Pill group (replaces checkboxes) ────────────────────────────────────── */
.pill-group {
  display: flex;
  gap: 4px;
  align-items: center;
}

.pill-group-label {
  font-size: 12px;
  color: #64748b;
  margin-right: 2px;
}

.pill-group button.pill {
  background: #e2e8f0;
  color: #64748b;
  border: none;
  border-radius: 999px;
  padding: 3px 12px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: background .15s, color .15s;
  line-height: 1.6;
}
.pill-group button.pill.selected {
  background: #6366f1;
  color: #fff;
}
.pill-group button.pill:hover:not(.selected) {
  background: #cbd5e1;
  color: #1e293b;
}

/* ── Best / Last toggle ───────────────────────────────────────────────────── */
.mode-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: #64748b;
}

.ct-btn {
  background: #e2e8f0;
  color: #64748b;
  border: none;
  border-radius: 999px;
  padding: 3px 12px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: background .15s, color .15s;
  line-height: 1.6;
}
.ct-btn.active {
  background: #6366f1;
  color: #fff;
}
.ct-btn:hover:not(.active) {
  background: #cbd5e1;
  color: #1e293b;
}

/* ── Table ────────────────────────────────────────────────────────────────── */
.tbl-wrap {
  overflow-x: auto;
  border-radius: 10px;
  border: 1px solid #e2e8f0;
  scrollbar-width: thin;
  scrollbar-color: #cbd5e1 transparent;
}

table {
  border-collapse: collapse;
  font-size: 12px;
  white-space: nowrap;
  width: 100%;
}

thead th {
  background: #f8fafc;
  color: #475569;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .05em;
  padding: 10px 12px;
  text-align: right;
  border-bottom: 2px solid #e2e8f0;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
  transition: background .12s, color .12s;
}
thead th:first-child,
thead th:nth-child(2) { text-align: left; }

thead th[data-asc],
thead th[data-desc] {
  background: #eef2ff;
  color: #4338ca;
}
thead th[data-asc]::after  { content: ' ▲'; font-size: 9px; }
thead th[data-desc]::after { content: ' ▼'; font-size: 9px; }

tbody td {
  padding: 8px 12px;
  border-bottom: 1px solid #f1f5f9;
  text-align: right;
  font-size: 12px;
  color: #1e293b;
  transition: background .1s;
}
tbody td:first-child,
tbody td:nth-child(2) { text-align: left; }

tbody tr:last-child td { border-bottom: none; }

tbody tr:hover td { background: #f8fafc !important; }

td.cell-best  {
  outline: 2px solid #6366f1;
  outline-offset: -2px;
  font-weight: 700;
}
td.cell-worst {
  outline: 2px solid #ef4444;
  outline-offset: -2px;
  font-weight: 700;
}

.child-row td { background: #fafafa; }
.child-first {
  padding-left: 32px !important;
  border-left: 3px solid #e2e8f0;
}

/* ── Toggle button ────────────────────────────────────────────────────────── */
.toggle {
  background: none;
  border: none;
  color: #94a3b8;
  cursor: pointer;
  font-size: 9px;
  padding: 0 4px 0 0;
  vertical-align: middle;
  line-height: 1;
  transition: color .15s;
}
.toggle:hover { color: #6366f1; }

/* ── Family stripes ───────────────────────────────────────────────────────── */
tr[data-family="wiki"]      td:first-child { border-left: 4px solid #10b981; }
tr[data-family="acereason"] td:first-child { border-left: 4px solid #8b5cf6; }
tr[data-family="baseline"]  td:first-child { border-left: 4px solid #94a3b8; }

.family-legend {
  display: flex;
  gap: 16px;
  font-size: 11px;
  color: #64748b;
  margin-top: 12px;
  flex-wrap: wrap;
}
.fl-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: 5px;
  vertical-align: middle;
  position: relative;
  top: -1px;
}
.fl-wiki      .fl-dot { background: #10b981; }
.fl-acereason .fl-dot { background: #8b5cf6; }
.fl-baseline  .fl-dot { background: #94a3b8; }

/* ── Top K ────────────────────────────────────────────────────────────────── */
.topk-controls {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
  font-size: 13px;
  color: #64748b;
  margin-bottom: 16px;
}

.topk-k-input {
  width: 56px;
  padding: 4px 8px;
  border: 1px solid #e2e8f0;
  border-radius: 7px;
  font-size: 13px;
  color: #1e293b;
  background: #fff;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
  text-align: center;
  -moz-appearance: textfield;
}
.topk-k-input::-webkit-inner-spin-button,
.topk-k-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
.topk-k-input:focus {
  border-color: #6366f1;
  box-shadow: 0 0 0 3px rgba(99,102,241,.12);
}

.domain-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px;
}

.domain-card {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  overflow: hidden;
  min-width: 0;
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
}

.domain-card-header {
  background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
  padding: 8px 12px;
  border-radius: 8px 8px 0 0;
}

.domain-card-header h4 {
  margin: 0;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  letter-spacing: .02em;
  text-transform: capitalize;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.domain-card-body { padding: 8px; }

.topk-list {
  margin: 0;
  padding: 0;
  list-style: none;
  counter-reset: topk-counter;
}

.topk-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
  padding: 5px 4px;
  border-bottom: 1px solid #f1f5f9;
  counter-increment: topk-counter;
}
.topk-item:last-child { border-bottom: none; }
.topk-item::before {
  content: counter(topk-counter);
  font-size: 10px;
  font-weight: 700;
  color: #94a3b8;
  min-width: 14px;
  text-align: center;
  flex-shrink: 0;
}

.tk-exp {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
  font-size: 11px;
  color: #334155;
}

.tk-score {
  background: #eff6ff;
  color: #3b82f6;
  border-radius: 999px;
  padding: 1px 8px;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── Stats bar ────────────────────────────────────────────────────────────── */
.stats-bar {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.stat-chip {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  padding: 12px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  min-width: 100px;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
}

.stat-value {
  font-size: 1.5rem;
  font-weight: 700;
  color: #6366f1;
  line-height: 1;
}

.stat-label {
  font-size: 11px;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: .05em;
}

/* ── Intersection observer for nav active state ───────────────────────────── */
.section-anchor { scroll-margin-top: 64px; }
</style>
</head>
<body>

<nav id="nav">
  <span class="nav-title">BRIGHT Results</span>
  <div class="nav-links" id="nav-links"></div>
  <span class="nav-date" id="nav-date"></span>
</nav>

<div id="content">
  <div id="loading-wrap">
    <div class="spinner"></div>
    <div class="loading-msg" id="loading">
      Loading <code>data.json</code>…<br>
      <small>If viewing locally, serve with: <code>python -m http.server</code></small>
    </div>
  </div>
</div>

<script>
// ── globals ──────────────────────────────────────────────────────────────────
let TASKS = [], METRIC = 'NDCG@10', DATA = null;

// ── boot ─────────────────────────────────────────────────────────────────────
fetch('./data.json')
  .then(r => { if (!r.ok) throw new Error(r.status + ' ' + r.statusText); return r.json(); })
  .then(data => {
    DATA = data;
    TASKS = data.meta.tasks;
    METRIC = data.meta.metric;
    DATA._expMap = {};
    data.experiments.forEach(e => DATA._expMap[e.name] = e);
    DATA._fields = ['experiment', 'retriever_size', ...TASKS, 'avg'];
    const wrap = document.getElementById('loading-wrap');
    if (wrap) wrap.remove();
    document.title = 'BRIGHT Results';
    buildNav(data);
    buildStatsBar(data);
    buildTopK(data);
    buildExperimentsTable(data);
    setupNavObserver();
  })
  .catch(err => {
    const wrap = document.getElementById('loading-wrap');
    if (wrap) wrap.querySelector('.spinner').remove();
    document.getElementById('loading').innerHTML =
      `<b>Could not load data.json.</b><br>
       If viewing locally, serve with: <code>python -m http.server</code><br>
       <small style="color:#94a3b8;font-size:12px">${err}</small>`;
  });

// ── utilities ─────────────────────────────────────────────────────────────────
function cellBg(t) { return `hsl(${Math.round(t * 120)},55%,82%)`; }

function fmt(v, field) {
  if (v == null) return '';
  if (field === 'experiment' || field === 'retriever_size') return v;
  return typeof v === 'number' ? v.toFixed(2) : v;
}

function expVal(exp, field) {
  if (field === 'experiment')     return exp.name;
  if (field === 'retriever_size') return exp.retriever_size;
  if (field === 'avg')            return exp.avg != null ? exp.avg.toFixed(2) : '';
  const s = exp.scores[field];
  return s != null ? s.toFixed(2) : '';
}

function expFamily(name) {
  const base = name.replace(/\/checkpoint-.*/, '');
  if (base.startsWith('wiki'))      return 'wiki';
  if (base.startsWith('acereason')) return 'acereason';
  return 'baseline';
}

function el(tag, props = {}, ...children) {
  const e = document.createElement(tag);
  Object.entries(props).forEach(([k, v]) => {
    if (k === 'cls')  e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k === 'text') e.textContent = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else e[k] = v;
  });
  children.flat().forEach(c => c && e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c));
  return e;
}

// ── recolorTable ─────────────────────────────────────────────────────────────
function recolorTable(tbl) {
  const tbody = tbl.querySelector('tbody');
  const rows = Array.from(tbody.querySelectorAll('tr')).filter(r => r.style.display !== 'none');
  const ncols = tbl.querySelector('thead tr').cells.length;
  const mins = new Array(ncols).fill(Infinity);
  const maxs = new Array(ncols).fill(-Infinity);
  rows.forEach(row => {
    Array.from(row.cells).forEach((cell, i) => {
      const v = parseFloat(cell.dataset.val);
      if (!isNaN(v)) { mins[i] = Math.min(mins[i], v); maxs[i] = Math.max(maxs[i], v); }
    });
  });
  tbody.querySelectorAll('tr').forEach(row => {
    const visible = row.style.display !== 'none';
    Array.from(row.cells).forEach((cell, i) => {
      cell.classList.remove('cell-best', 'cell-worst');
      const v = parseFloat(cell.dataset.val);
      if (!isNaN(v) && maxs[i] > mins[i] && visible) {
        cell.style.background = cellBg((v - mins[i]) / (maxs[i] - mins[i]));
        if (v === maxs[i]) cell.classList.add('cell-best');
        if (v === mins[i]) cell.classList.add('cell-worst');
      } else {
        cell.style.background = '';
      }
    });
  });
}

// ── table interactions ────────────────────────────────────────────────────────
function sortTable(th) {
  const table = th.closest('table');
  const idx = Array.from(th.parentNode.children).indexOf(th);
  const asc = !th.hasAttribute('data-asc');
  th.parentNode.querySelectorAll('th').forEach(h => { h.removeAttribute('data-asc'); h.removeAttribute('data-desc'); });
  th.setAttribute(asc ? 'data-asc' : 'data-desc', '');
  const tbody = table.querySelector('tbody');
  Array.from(tbody.querySelectorAll('tr:not(.child-row)'))
    .sort((a, b) => {
      const av = a.cells[idx].dataset.val ?? '', bv = b.cells[idx].dataset.val ?? '';
      const an = parseFloat(av), bn = parseFloat(bv);
      return (asc ? 1 : -1) * ((!isNaN(an) && !isNaN(bn)) ? an - bn : av.localeCompare(bv));
    })
    .forEach(row => {
      tbody.appendChild(row);
      const gid = row.dataset.gid;
      if (gid) tbody.querySelectorAll(`[data-parent="${gid}"]`).forEach(c => tbody.appendChild(c));
    });
}

function makeFilterFn(table, block) {
  return () => {
    const checked = new Set(Array.from(block.querySelectorAll('.pill-group button.selected')).map(btn => btn.dataset.size));
    const tbody = table.querySelector('tbody');
    tbody.querySelectorAll('tr:not(.child-row)').forEach(row => {
      const visible = checked.has(row.dataset.size);
      row.style.display = visible ? '' : 'none';
      const gid = row.dataset.gid;
      if (gid) {
        const expanded = row.querySelector('.toggle')?.textContent.trim() === '▼';
        tbody.querySelectorAll(`[data-parent="${gid}"]`).forEach(child => {
          child.style.display = (visible && expanded && checked.has(child.dataset.size)) ? '' : 'none';
        });
      }
    });
    recolorTable(table);
  };
}

// ── pill group helper ─────────────────────────────────────────────────────────
function makePillGroup(sizes, onChange) {
  const div = el('div', {cls: 'pill-group'});
  sizes.forEach(size => {
    const btn = el('button', {cls: 'pill selected', text: size});
    btn.dataset.size = size;
    btn.addEventListener('click', () => {
      btn.classList.toggle('selected');
      onChange();
    });
    div.appendChild(btn);
  });
  return div;
}

// ── nav ───────────────────────────────────────────────────────────────────────
function buildNav(data) {
  const navLinks = document.getElementById('nav-links');
  const navDate = document.getElementById('nav-date');

  [['topk', 'Top K'], ['experiments', 'Experiments']].forEach(([id, label]) => {
    navLinks.appendChild(el('a', {href: '#' + id, text: label}));
  });
  navLinks.appendChild(el('a', {href: 'checkpoints.html', text: 'Training Curves →'}));

  // Generated timestamp
  const now = new Date();
  navDate.textContent = 'Generated ' + now.toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'});
}

// ── Active nav link via IntersectionObserver ──────────────────────────────────
function setupNavObserver() {
  const sections = document.querySelectorAll('section[id]');
  const links = document.querySelectorAll('#nav-links a');
  if (!sections.length || !links.length) return;

  const map = {};
  links.forEach(a => {
    const id = a.getAttribute('href').slice(1);
    map[id] = a;
  });

  const io = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      const a = map[entry.target.id];
      if (a) a.classList.toggle('active', entry.isIntersecting);
    });
  }, { rootMargin: '-52px 0px -60% 0px', threshold: 0 });

  sections.forEach(s => io.observe(s));
}

// ── Stats bar ─────────────────────────────────────────────────────────────────
function buildStatsBar(data) {
  const numExps = data.experiments.length;
  const numFamilies = data.groups ? Object.keys(data.groups).length : 0;
  const metric = data.meta.metric;

  const chips = [
    {value: numExps, label: 'experiments'},
    {value: numFamilies, label: 'families'},
    {value: metric, label: 'metric'},
  ];

  const bar = el('div', {cls: 'stats-bar'});
  chips.forEach(({value, label}) => {
    bar.appendChild(el('div', {cls: 'stat-chip'},
      el('span', {cls: 'stat-value', id: label === 'metric' ? 'stat-metric' : undefined, text: String(value)}),
      el('span', {cls: 'stat-label', text: label}),
    ));
  });

  document.getElementById('content').appendChild(bar);
}

// ── Top K ─────────────────────────────────────────────────────────────────────
function buildTopK(data) {
  const { experiments, meta } = data;
  const rankings = {};
  meta.tasks.forEach(task => {
    rankings[task] = [...experiments]
      .filter(e => e.scores[task] != null)
      .sort((a, b) => b.scores[task] - a.scores[task]);
  });

  const kInput = el('input', {
    type: 'number',
    id: 'topk-k',
    value: '3',
    min: '1',
    max: '50',
    cls: 'topk-k-input',
    oninput: updateTopK
  });

  const pillGroup = makePillGroup(['3B', '8B'], updateTopK);
  // Give topk filter pills the class topk-filter for updateTopK to query
  pillGroup.querySelectorAll('button').forEach(b => b.classList.add('topk-filter'));

  const controls = el('div', {cls: 'topk-controls'},
    el('span', {cls: 'pill-group-label'}, 'Show top'),
    kInput,
    el('span', {cls: 'pill-group-label'}, 'results for:'),
    pillGroup,
  );

  const grid = el('div', {cls: 'domain-grid', id: 'topk-grid'});
  meta.tasks.forEach(task => {
    const ol = el('ol', {cls: 'topk-list'});
    rankings[task].forEach(exp => {
      ol.appendChild(el('li', {cls: 'topk-item', 'data-size': exp.retriever_size},
        el('span', {cls: 'tk-exp', title: exp.name, text: exp.name}),
        el('span', {cls: 'tk-score', text: exp.scores[task].toFixed(2)}),
      ));
    });
    const card = el('div', {cls: 'domain-card'},
      el('div', {cls: 'domain-card-header'},
        el('h4', {text: task.replace(/_/g, ' ')})
      ),
      el('div', {cls: 'domain-card-body'}, ol)
    );
    grid.appendChild(card);
  });

  const section = el('section', {id: 'topk', cls: 'section-anchor'},
    el('h2', {text: 'Top K per Domain'}),
    controls,
    grid
  );
  document.getElementById('content').appendChild(section);
  updateTopK();
}

function updateTopK() {
  const k = Math.max(1, parseInt(document.getElementById('topk-k')?.value) || 3);
  const checked = new Set(Array.from(document.querySelectorAll('.topk-filter.selected')).map(btn => btn.dataset.size));
  document.querySelectorAll('.topk-list').forEach(list => {
    let shown = 0;
    list.querySelectorAll('.topk-item').forEach(item => {
      const ok = checked.has(item.dataset.size) && shown < k;
      item.style.display = ok ? '' : 'none';
      if (ok) shown++;
    });
  });
}

// ── Experiments table ─────────────────────────────────────────────────────────
function buildExperimentsTable(data) {
  const { experiments } = data;
  const fields = DATA._fields;
  const expMap = DATA._expMap;

  // Group by (base, size)
  const grpMap = {};
  experiments.forEach(exp => {
    const m = exp.name.match(/^(.+)\/checkpoint-\d+/);
    const base = m ? m[1] : exp.name;
    const key = base + '::' + exp.retriever_size;
    if (!grpMap[key]) grpMap[key] = {exps: []};
    grpMap[key].exps.push(exp);
  });
  Object.values(grpMap).forEach(g => {
    g.exps.sort((a, b) => (a.checkpoint_step || 0) - (b.checkpoint_step || 0));
  });

  // Derive best + last + children per group
  const parents = Object.values(grpMap).map(g => {
    const bestExp = g.exps.reduce((a, b) => ((a.avg || 0) >= (b.avg || 0) ? a : b));
    const lastExp = g.exps[g.exps.length - 1];
    const children = g.exps.filter(e => e !== bestExp);
    return {bestExp, lastExp, children};
  }).sort((a, b) => (b.bestExp.avg || 0) - (a.bestExp.avg || 0));

  // Build section
  const section = el('section', {id: 'experiments', cls: 'section-anchor'},
    el('h2', {text: 'Experiments'})
  );
  const block = el('div', {cls: 'tbl-block'});
  section.appendChild(block);

  // Controls — pill group replaces checkboxes
  const pillGroup = makePillGroup(['3B', '8B'], () => doFilter());

  const bestBtn = el('button', {cls: 'ct-btn active', text: 'Best'});
  const lastBtn = el('button', {cls: 'ct-btn',        text: 'Last'});
  const controls = el('div', {cls: 'tbl-controls'},
    el('span', {cls: 'pill-group-label'}, 'Filter size:'),
    pillGroup,
    el('span', {cls: 'mode-toggle'}, 'Parent row:', bestBtn, lastBtn),
  );
  block.appendChild(controls);

  // Table
  const wrap = el('div', {cls: 'tbl-wrap'});
  const table = el('table');
  const thead = el('thead');
  const headerRow = el('tr');
  fields.forEach(field => {
    const th = el('th', {text: field.replace(/_/g, ' ')});
    th.onclick = () => sortTable(th);
    headerRow.appendChild(th);
  });
  thead.appendChild(headerRow);
  table.appendChild(thead);

  const tbody = el('tbody');

  parents.forEach((p, pi) => {
    const {bestExp, lastExp, children} = p;
    const hasChildren = children.length > 0;
    const gid = 'g' + pi;

    // Parent row
    const tr = el('tr', {
      'data-size':   bestExp.retriever_size,
      'data-family': expFamily(bestExp.name),
    });
    if (hasChildren) {
      tr.classList.add('parent-row');
      tr.dataset.gid      = gid;
      tr.dataset.bestName = bestExp.name;
      tr.dataset.lastName = lastExp.name;
    }
    fields.forEach((field, j) => {
      const val = expVal(bestExp, field);
      const td = el('td');
      td.dataset.val = val;
      if (j === 0 && hasChildren) {
        const btn = el('button', {cls: 'toggle', text: '▶'});
        btn.addEventListener('click', () => toggleRow(gid, tbody, table, block));
        td.appendChild(btn);
        td.appendChild(document.createTextNode(' ' + val));
      } else {
        td.textContent = val;
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);

    // Child rows
    children.forEach(child => {
      const ctr = el('tr', {cls: 'child-row', style: 'display:none',
        'data-parent': gid, 'data-size': child.retriever_size,
        'data-family': expFamily(child.name)});
      fields.forEach((field, j) => {
        const val = expVal(child, field);
        const td = el('td');
        td.dataset.val = val;
        td.textContent = val;
        if (j === 0) td.classList.add('child-first');
        ctr.appendChild(td);
      });
      tbody.appendChild(ctr);
    });
  });

  table.appendChild(tbody);
  wrap.appendChild(table);
  block.appendChild(wrap);

  // Family legend
  block.appendChild(el('div', {cls: 'family-legend'},
    el('span', {cls: 'fl-wiki'},
      el('span', {cls: 'fl-dot'}), 'wiki'),
    el('span', {cls: 'fl-acereason'},
      el('span', {cls: 'fl-dot'}), 'acereason'),
    el('span', {cls: 'fl-baseline'},
      el('span', {cls: 'fl-dot'}), 'baseline'),
  ));

  document.getElementById('content').appendChild(section);

  // Wire interactions (after table is in DOM)
  const doFilter = makeFilterFn(table, block);

  bestBtn.addEventListener('click', () => {
    bestBtn.classList.add('active'); lastBtn.classList.remove('active');
    swapParentMode('best', table);
  });
  lastBtn.addEventListener('click', () => {
    lastBtn.classList.add('active'); bestBtn.classList.remove('active');
    swapParentMode('last', table);
  });

  recolorTable(table);
}

function toggleRow(gid, tbody, table, block) {
  const parentRow = tbody.querySelector(`[data-gid="${gid}"]`);
  const btn = parentRow.querySelector('.toggle');
  const children = tbody.querySelectorAll(`[data-parent="${gid}"]`);
  const expanding = btn.textContent.trim() === '▶';
  btn.textContent = expanding ? '▼' : '▶';
  if (expanding) {
    const checked = new Set(Array.from(block.querySelectorAll('.pill-group button.selected')).map(btn => btn.dataset.size));
    children.forEach(r => r.style.display = checked.has(r.dataset.size) ? '' : 'none');
  } else {
    children.forEach(r => r.style.display = 'none');
  }
  recolorTable(table);
}

function swapParentMode(mode, table) {
  const expMap = DATA._expMap;
  const fields = DATA._fields;
  table.querySelectorAll('tr.parent-row').forEach(row => {
    const expName = mode === 'best' ? row.dataset.bestName : row.dataset.lastName;
    if (!expName || !expMap[expName]) return;
    const exp = expMap[expName];
    row.dataset.size = exp.retriever_size;
    row.dataset.family = expFamily(exp.name);
    Array.from(row.cells).forEach((cell, i) => {
      if (cell.querySelector('.toggle')) return;
      const val = expVal(exp, fields[i]);
      cell.dataset.val = val;
      cell.textContent = val;
    });
  });
  recolorTable(table);
}
