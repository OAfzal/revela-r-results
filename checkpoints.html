<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRIGHT — Training Curves</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
/* ── Reset & base ─────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  margin: 0;
  background: #f1f5f9;
  color: #1e293b;
  line-height: 1.5;
  scrollbar-width: thin;
  scrollbar-color: #cbd5e1 transparent;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }

/* ── Nav ──────────────────────────────────────────────────────────────────── */
nav {
  position: sticky;
  top: 0;
  background: #1e293b;
  height: 52px;
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 4px;
  z-index: 200;
  box-shadow: 0 1px 0 rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.2);
}

.nav-title {
  color: #fff;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: .01em;
  margin-right: 12px;
  white-space: nowrap;
  flex-shrink: 0;
  text-decoration: none;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 2px;
  flex: 1;
  flex-wrap: wrap;
  overflow: hidden;
}

nav a {
  color: #94a3b8;
  text-decoration: none;
  font-size: 12px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 6px;
  transition: background .15s, color .15s;
  white-space: nowrap;
}
nav a:hover { background: rgba(255,255,255,.1); color: #e2e8f0; }
nav a.active { background: rgba(99,102,241,.25); color: #a5b4fc; }

.nav-sep {
  color: #475569;
  font-size: 12px;
  padding: 0 4px;
  flex-shrink: 0;
}

.nav-date {
  font-size: 11px;
  color: #475569;
  white-space: nowrap;
  margin-left: auto;
  flex-shrink: 0;
  padding-left: 16px;
}

/* ── Layout ───────────────────────────────────────────────────────────────── */
#content {
  max-width: 1400px;
  margin: 0 auto;
  padding: 24px 20px 48px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ── Controls bar ─────────────────────────────────────────────────────────── */
.controls-bar {
  background: #fff;
  border-radius: 14px;
  padding: 16px 20px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 8px 24px rgba(0,0,0,.05);
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  align-items: center;
}

.controls-group {
  display: flex;
  align-items: center;
  gap: 8px;
}

.controls-label {
  font-size: 12px;
  color: #64748b;
  font-weight: 500;
}

/* ── Cards ────────────────────────────────────────────────────────────────── */
section {
  background: #ffffff;
  border-radius: 14px;
  padding: 24px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08), 0 8px 24px rgba(0,0,0,.05);
}

section h2 {
  margin: 0 0 18px;
  font-size: 1rem;
  font-weight: 600;
  color: #1e293b;
  border-left: 3px solid #6366f1;
  padding-left: 10px;
  line-height: 1.4;
}

/* ── Loading ──────────────────────────────────────────────────────────────── */
#loading-wrap {
  min-height: 60vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 60px 20px;
}

.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid #e2e8f0;
  border-top-color: #6366f1;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  flex-shrink: 0;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-msg {
  text-align: center;
  color: #64748b;
  font-size: 14px;
  line-height: 1.8;
}
.loading-msg b { color: #1e293b; }
.loading-msg code {
  background: #f1f5f9;
  border: 1px solid #e2e8f0;
  padding: 2px 7px;
  border-radius: 5px;
  font-size: 12px;
  color: #6366f1;
}

/* ── Pill group ───────────────────────────────────────────────────────────── */
.pill-group {
  display: flex;
  gap: 4px;
  align-items: center;
  flex-wrap: wrap;
}

.pill-group button.pill {
  background: #e2e8f0;
  color: #64748b;
  border: none;
  border-radius: 999px;
  padding: 3px 12px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: background .15s, color .15s;
  line-height: 1.6;
}
.pill-group button.pill.selected {
  background: #6366f1;
  color: #fff;
}
.pill-group button.pill:hover:not(.selected) {
  background: #cbd5e1;
  color: #1e293b;
}

/* ── Table ────────────────────────────────────────────────────────────────── */
.tbl-wrap {
  overflow-x: auto;
  border-radius: 10px;
  border: 1px solid #e2e8f0;
  scrollbar-width: thin;
  scrollbar-color: #cbd5e1 transparent;
  margin-bottom: 16px;
}

table {
  border-collapse: collapse;
  font-size: 12px;
  white-space: nowrap;
  width: 100%;
}

thead th {
  background: #f8fafc;
  color: #475569;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .05em;
  padding: 10px 12px;
  text-align: right;
  border-bottom: 2px solid #e2e8f0;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
  transition: background .12s, color .12s;
}
thead th:first-child,
thead th:nth-child(2) { text-align: left; }

thead th[data-asc],
thead th[data-desc] {
  background: #eef2ff;
  color: #4338ca;
}
thead th[data-asc]::after  { content: ' ▲'; font-size: 9px; }
thead th[data-desc]::after { content: ' ▼'; font-size: 9px; }

tbody td {
  padding: 8px 12px;
  border-bottom: 1px solid #f1f5f9;
  text-align: right;
  font-size: 12px;
  color: #1e293b;
  transition: background .1s;
}
tbody td:first-child,
tbody td:nth-child(2) { text-align: left; }

tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #f8fafc !important; }

td.cell-best {
  outline: 2px solid #6366f1;
  outline-offset: -2px;
  font-weight: 700;
}
td.cell-worst {
  outline: 2px solid #ef4444;
  outline-offset: -2px;
  font-weight: 700;
}

/* ── Family stripes ───────────────────────────────────────────────────────── */
tr[data-family="wiki"]      td:first-child { border-left: 4px solid #10b981; }
tr[data-family="acereason"] td:first-child { border-left: 4px solid #8b5cf6; }
tr[data-family="baseline"]  td:first-child { border-left: 4px solid #94a3b8; }

/* ── Chart styles ─────────────────────────────────────────────────────────── */
.chart-size-block { margin-top: 16px; }

.chart-size-label {
  display: inline-block;
  background: #eff6ff;
  color: #6366f1;
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 8px;
}

.chart-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
  margin-top: 4px;
}

.chart-card {
  background: #fafbfc;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  padding: 10px 8px 6px;
  min-width: 0;
  overflow: hidden;
}

/* ── Intersection observer for nav active state ───────────────────────────── */
.section-anchor { scroll-margin-top: 64px; }
</style>
</head>
<body>

<nav id="nav">
  <a href="index.html" class="nav-title">BRIGHT Results</a>
  <div class="nav-links" id="nav-links">
    <a href="index.html">← Leaderboard</a>
    <span class="nav-sep">|</span>
  </div>
  <span class="nav-date" id="nav-date"></span>
</nav>

<div id="content">
  <div id="loading-wrap">
    <div class="spinner"></div>
    <div class="loading-msg" id="loading">
      Loading <code>data.json</code>…<br>
      <small>If viewing locally, serve with: <code>python -m http.server</code></small>
    </div>
  </div>
</div>

<script>
// ── globals ──────────────────────────────────────────────────────────────────
let TASKS = [], METRIC = 'NDCG@10', DATA = null;

// ── boot ─────────────────────────────────────────────────────────────────────
fetch('./data.json')
  .then(r => { if (!r.ok) throw new Error(r.status + ' ' + r.statusText); return r.json(); })
  .then(data => {
    DATA = data;
    TASKS = data.meta.tasks;
    METRIC = data.meta.metric;
    DATA._expMap = {};
    data.experiments.forEach(e => DATA._expMap[e.name] = e);
    const wrap = document.getElementById('loading-wrap');
    if (wrap) wrap.remove();
    document.title = 'BRIGHT — Training Curves';
    buildNav(data);
    buildControls(data);
    const plotlyInits = buildCheckpointSections(data);
    setupNavObserver();
    requestAnimationFrame(() => plotlyInits.forEach(fn => fn()));
  })
  .catch(err => {
    const wrap = document.getElementById('loading-wrap');
    if (wrap) wrap.querySelector('.spinner').remove();
    document.getElementById('loading').innerHTML =
      `<b>Could not load data.json.</b><br>
       If viewing locally, serve with: <code>python -m http.server</code><br>
       <small style="color:#94a3b8;font-size:12px">${err}</small>`;
  });

// ── utilities ─────────────────────────────────────────────────────────────────
function cellBg(t) { return `hsl(${Math.round(t * 120)},55%,82%)`; }

function expVal(exp, field) {
  if (field === 'experiment')     return exp.name;
  if (field === 'retriever_size') return exp.retriever_size;
  if (field === 'avg')            return exp.avg != null ? exp.avg.toFixed(2) : '';
  const s = exp.scores[field];
  return s != null ? s.toFixed(2) : '';
}

function expFamily(name) {
  const base = name.replace(/\/checkpoint-.*/, '');
  if (base.startsWith('wiki'))      return 'wiki';
  if (base.startsWith('acereason')) return 'acereason';
  return 'baseline';
}

function el(tag, props = {}, ...children) {
  const e = document.createElement(tag);
  Object.entries(props).forEach(([k, v]) => {
    if (k === 'cls')  e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k === 'text') e.textContent = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else e[k] = v;
  });
  children.flat().forEach(c => c && e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c));
  return e;
}

// ── recolorTable ─────────────────────────────────────────────────────────────
function recolorTable(tbl) {
  const tbody = tbl.querySelector('tbody');
  const rows = Array.from(tbody.querySelectorAll('tr')).filter(r => r.style.display !== 'none');
  const ncols = tbl.querySelector('thead tr').cells.length;
  const mins = new Array(ncols).fill(Infinity);
  const maxs = new Array(ncols).fill(-Infinity);
  rows.forEach(row => {
    Array.from(row.cells).forEach((cell, i) => {
      const v = parseFloat(cell.dataset.val);
      if (!isNaN(v)) { mins[i] = Math.min(mins[i], v); maxs[i] = Math.max(maxs[i], v); }
    });
  });
  tbody.querySelectorAll('tr').forEach(row => {
    const visible = row.style.display !== 'none';
    Array.from(row.cells).forEach((cell, i) => {
      cell.classList.remove('cell-best', 'cell-worst');
      const v = parseFloat(cell.dataset.val);
      if (!isNaN(v) && maxs[i] > mins[i] && visible) {
        cell.style.background = cellBg((v - mins[i]) / (maxs[i] - mins[i]));
        if (v === maxs[i]) cell.classList.add('cell-best');
        if (v === mins[i]) cell.classList.add('cell-worst');
      } else {
        cell.style.background = '';
      }
    });
  });
}

// ── table sort ────────────────────────────────────────────────────────────────
function sortTable(th) {
  const table = th.closest('table');
  const idx = Array.from(th.parentNode.children).indexOf(th);
  const asc = !th.hasAttribute('data-asc');
  th.parentNode.querySelectorAll('th').forEach(h => { h.removeAttribute('data-asc'); h.removeAttribute('data-desc'); });
  th.setAttribute(asc ? 'data-asc' : 'data-desc', '');
  const tbody = table.querySelector('tbody');
  Array.from(tbody.querySelectorAll('tr'))
    .sort((a, b) => {
      const av = a.cells[idx].dataset.val ?? '', bv = b.cells[idx].dataset.val ?? '';
      const an = parseFloat(av), bn = parseFloat(bv);
      return (asc ? 1 : -1) * ((!isNaN(an) && !isNaN(bn)) ? an - bn : av.localeCompare(bv));
    })
    .forEach(row => tbody.appendChild(row));
}

// ── nav ───────────────────────────────────────────────────────────────────────
function buildNav(data) {
  const navLinks = document.getElementById('nav-links');
  const navDate = document.getElementById('nav-date');

  if (data.groups) {
    Object.keys(data.groups).sort().forEach(base => {
      const sid = base.replace(/[^a-zA-Z0-9]+/g, '-');
      navLinks.appendChild(el('a', {href: '#' + sid, text: base, 'data-family-nav': sid}));
    });
  }

  const now = new Date();
  navDate.textContent = 'Generated ' + now.toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'});
}

// ── controls ──────────────────────────────────────────────────────────────────
function buildControls(data) {
  if (!data.groups) return;

  const families = Object.keys(data.groups).sort();
  const allSizes = new Set();
  Object.values(data.groups).forEach(sg => Object.keys(sg).forEach(s => allSizes.add(s)));
  const sizes = [...allSizes].sort();

  // Family pills
  const familyPillGroup = el('div', {cls: 'pill-group'});
  families.forEach(base => {
    const sid = base.replace(/[^a-zA-Z0-9]+/g, '-');
    const btn = el('button', {cls: 'pill selected', text: base});
    btn.dataset.family = sid;
    btn.addEventListener('click', () => {
      btn.classList.toggle('selected');
      const section = document.getElementById(sid);
      if (section) section.style.display = btn.classList.contains('selected') ? '' : 'none';
      // Also hide/show the corresponding nav link
      const navLink = document.querySelector(`[data-family-nav="${sid}"]`);
      if (navLink) navLink.style.display = btn.classList.contains('selected') ? '' : 'none';
    });
    familyPillGroup.appendChild(btn);
  });

  // Size pills
  const sizePillGroup = el('div', {cls: 'pill-group'});
  sizes.forEach(size => {
    const btn = el('button', {cls: 'pill selected', text: size});
    btn.dataset.size = size;
    btn.addEventListener('click', () => {
      btn.classList.toggle('selected');
      const selected = btn.classList.contains('selected');
      document.querySelectorAll(`.chart-size-block[data-size="${size}"]`).forEach(block => {
        block.style.display = selected ? '' : 'none';
      });
    });
    sizePillGroup.appendChild(btn);
  });

  const bar = el('div', {cls: 'controls-bar'},
    el('div', {cls: 'controls-group'},
      el('span', {cls: 'controls-label'}, 'Families:'),
      familyPillGroup,
    ),
    el('div', {cls: 'controls-group'},
      el('span', {cls: 'controls-label'}, 'Size:'),
      sizePillGroup,
    ),
  );

  document.getElementById('content').appendChild(bar);
}

// ── Active nav link via IntersectionObserver ──────────────────────────────────
function setupNavObserver() {
  const sections = document.querySelectorAll('section[id]');
  const links = document.querySelectorAll('#nav-links a[data-family-nav]');
  if (!sections.length || !links.length) return;

  const map = {};
  links.forEach(a => {
    const id = a.getAttribute('href').slice(1);
    map[id] = a;
  });

  const io = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      const a = map[entry.target.id];
      if (a) a.classList.toggle('active', entry.isIntersecting);
    });
  }, { rootMargin: '-52px 0px -60% 0px', threshold: 0 });

  sections.forEach(s => io.observe(s));
}

// ── Checkpoint sections ───────────────────────────────────────────────────────
function buildCheckpointSections(data) {
  if (!data.groups) return [];
  const expMap = DATA._expMap;
  const { meta } = data;
  const plotlyInits = [];

  Object.entries(data.groups).sort((a, b) => a[0].localeCompare(b[0])).forEach(([base, sizeGroups]) => {
    const sid = base.replace(/[^a-zA-Z0-9]+/g, '-');
    const section = el('section', {id: sid, cls: 'section-anchor'}, el('h2', {text: base}));

    // Flat checkpoint table (all sizes, sorted by step)
    const allExps = Object.values(sizeGroups).flat()
      .map(n => expMap[n]).filter(Boolean)
      .sort((a, b) => (a.checkpoint_step || 0) - (b.checkpoint_step || 0));
    section.appendChild(buildFlatTable(allExps, meta.tasks));

    // Per-size Plotly charts
    Object.entries(sizeGroups).forEach(([size, expNames]) => {
      const exps = expNames.map(n => expMap[n]).filter(Boolean);
      const sizeBlock = el('div', {cls: 'chart-size-block'});
      sizeBlock.dataset.size = size;
      sizeBlock.appendChild(el('div', {cls: 'chart-size-label', text: size + ' checkpoints'}));
      const {grid, inits} = buildChartGrid(base, size, exps, meta.tasks, meta.metric);
      sizeBlock.appendChild(grid);
      plotlyInits.push(...inits);
      section.appendChild(sizeBlock);
    });

    document.getElementById('content').appendChild(section);
  });

  return plotlyInits;
}

function buildFlatTable(exps, tasks) {
  const fields = ['experiment', 'retriever_size', ...tasks, 'avg'];
  const table = el('table');
  const thead = el('thead');
  const hrow = el('tr');
  fields.forEach(f => {
    const th = el('th', {text: f.replace(/_/g, ' ')});
    th.onclick = () => sortTable(th);
    hrow.appendChild(th);
  });
  thead.appendChild(hrow);
  table.appendChild(thead);

  const tbody = el('tbody');
  exps.forEach(exp => {
    const tr = el('tr', {'data-size': exp.retriever_size, 'data-family': expFamily(exp.name)});
    fields.forEach(field => {
      const val = expVal(exp, field);
      const td = el('td');
      td.dataset.val = val;
      td.textContent = val;
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);

  const wrap = el('div', {cls: 'tbl-wrap'}, table);
  requestAnimationFrame(() => recolorTable(table));
  return wrap;
}

function buildChartGrid(base, size, exps, tasks, metric) {
  const color = size === '8B' ? '#8b5cf6' : '#6366f1';
  const grid = el('div', {cls: 'chart-grid'});
  const inits = [];

  tasks.forEach((task, i) => {
    const cid = `pc-${base.replace(/[^a-zA-Z0-9]/g, '')}-${size}-${i}`;
    const chartDiv = el('div', {id: cid, style: 'height:200px'});
    grid.appendChild(el('div', {cls: 'chart-card'}, chartDiv));

    const steps = [], ys = [];
    exps.forEach(exp => {
      if (exp.checkpoint_step != null && exp.scores[task] != null) {
        steps.push(exp.checkpoint_step);
        ys.push(Math.round(exp.scores[task] * 100) / 100);
      }
    });

    inits.push(() => {
      Plotly.newPlot(cid, [{
        type: 'scatter', x: steps, y: ys,
        mode: 'lines+markers', name: size,
        line: {color, width: 2}, marker: {size: 5, color},
        hovertemplate: '%{x}: %{y:.2f}<extra>' + size + '</extra>',
      }], {
        title: {text: task.replace(/_/g, ' '), font: {size: 11, color: '#334155', family: 'system-ui'}, x: 0.5},
        xaxis: {title: 'step', titlefont: {size: 9, color: '#64748b'}, tickfont: {size: 8, color: '#94a3b8'},
                gridcolor: '#f1f5f9', linecolor: '#e2e8f0', zerolinecolor: '#e2e8f0'},
        yaxis: {title: metric, titlefont: {size: 9, color: '#64748b'}, tickfont: {size: 8, color: '#94a3b8'},
                gridcolor: '#f1f5f9', linecolor: '#e2e8f0', zerolinecolor: '#e2e8f0'},
        margin: {l: 45, r: 10, t: 30, b: 45},
        plot_bgcolor: '#fff', paper_bgcolor: 'rgba(0,0,0,0)', height: 200,
      }, {responsive: true, displayModeBar: false});
    });
  });

  return {grid, inits};
}
</script>
